<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0284c7" />
    <title>Sei offline | Comparatore Fondi Pensione</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --primary: #0284c7;
        --text: #0f172a;
        --muted: #475569;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #dbeafe 0%, var(--bg) 58%);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      main {
        width: min(560px, calc(100% - 2rem));
        background: var(--surface);
        border: 1px solid #dbeafe;
        border-radius: 16px;
        padding: 2rem 1.5rem;
        box-shadow: 0 18px 40px -24px rgba(2, 132, 199, 0.45);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.3rem, 2vw, 1.7rem);
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.5;
        color: var(--muted);
      }

      button {
        margin-top: 0.75rem;
        border: 0;
        border-radius: 10px;
        padding: 0.7rem 1rem;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Connessione assente</h1>
      <p>
        Il comparatore non riesce a raggiungere internet. Se avevi gi&agrave; aperto l'app, alcune sezioni restano
        disponibili in cache.
      </p>
      <p>Riprova quando la rete torna disponibile.</p>
      <button type="button" onclick="window.location.reload()">Ricarica</button>
    </main>
  </body>
</html>

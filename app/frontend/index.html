  <body class="bg-slate-50 dark:bg-slate-950">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <!-- Persistent iubenda shift for mobile bottom nav -->
    <script type="text/javascript">
      (function() {
        if (window.innerWidth >= 768) return;
        var root = document.getElementById('root');
        var timer = null;
        function shiftThirdPartyFixed() {
          var els = document.body.getElementsByTagName('*');
          for (var i = 0; i < els.length; i++) {
            var el = els[i];
            if (root && root.contains(el)) continue;
            var cs = window.getComputedStyle(el);
            if (cs.position === 'fixed') {
              var b = parseInt(cs.bottom, 10);
              if (!isNaN(b) && b < 70) {
                el.style.setProperty('bottom', '80px', 'important');
                el.style.setProperty('transform', 'scale(0.78)', 'important');
                el.style.setProperty('transform-origin', 'bottom right', 'important');
              }
            }
          }
        }
        // Debounced: run at most once per 2s on DOM mutations (avoids blocking main thread)
        function scheduleShift() {
          if (timer) return;
          timer = setTimeout(function() { timer = null; shiftThirdPartyFixed(); }, 2000);
        }
        // Run a few times on startup for late-injected widgets, then stop interval
        var runs = 0;
        var startupInterval = setInterval(function() {
          shiftThirdPartyFixed();
          if (++runs >= 5) clearInterval(startupInterval);
        }, 2000);
        // Also watch for new third-party widgets (debounced)
        new MutationObserver(scheduleShift)
          .observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
